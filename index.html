<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inventori Teknisi</title>
    <!-- Menggunakan Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        // ======= PENTING: GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA =======
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxg23kqURoPko1kYcV6s5hhUCzj-0iNfPj-fAp8zB4IUhuNQFQnaaM7v8JgLWp3z_Et/exec'; 
        // =========================================================================================

        // Fungsi untuk mengambil data dari Google Sheets
        async function loadData() {
            const tableBody = document.getElementById('tableBody');
            const loadingIndicator = document.getElementById('loadingIndicator');
            
            tableBody.innerHTML = '';
            loadingIndicator.classList.remove('hidden');

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                loadingIndicator.classList.add('hidden');
                
                if (data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">Belum ada data inventori.</td></tr>`;
                    return;
                }

                data.forEach(item => {
                    // Menentukan warna badge berdasarkan kondisi
                    let kondisiClass = 'bg-gray-100 text-gray-800';
                    if (item['Kondisi'] === 'Baik') kondisiClass = 'bg-green-100 text-green-800';
                    if (item['Kondisi'] === 'Rusak') kondisiClass = 'bg-red-100 text-red-800';
                    if (item['Kondisi'] === 'Perbaikan') kondisiClass = 'bg-yellow-100 text-yellow-800';

                    const row = document.createElement('tr');
                    row.className = "border-b hover:bg-gray-50 transition";
                    row.innerHTML = `
                        <td class="px-6 py-4 font-medium text-gray-900">${item['Nama Tool']}</td>
                        <td class="px-6 py-4 text-gray-700">${item['Ukuran']}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-xs font-semibold ${kondisiClass}">
                                ${item['Kondisi']}
                            </span>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                loadingIndicator.classList.add('hidden');
                tableBody.innerHTML = `<tr><td colspan="3" class="px-6 py-4 text-center text-red-500">Gagal memuat data. Pastikan URL Web App sudah benar.</td></tr>`;
                console.error('Error fetching data:', error);
            }
        }

        // Fungsi untuk mengirim data baru ke Google Sheets
        async function submitData(event) {
            event.preventDefault();
            
            if(SCRIPT_URL === 'MASUKKAN_URL_WEB_APP_ANDA_DISINI') {
                alert('Tolong masukkan URL Web App Google Apps Script Anda terlebih dahulu di dalam file index.html!');
                return;
            }

            const btnSubmit = document.getElementById('btnSubmit');
            const originalBtnText = btnSubmit.innerHTML;
            
            const namaTool = document.getElementById('namaTool').value;
            const ukuran = document.getElementById('ukuran').value;
            const kondisi = document.getElementById('kondisi').value;
            
            const payload = {
                namaTool: namaTool,
                ukuran: ukuran,
                kondisi: kondisi
            };

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Menyimpan...';

            try {
                // Menggunakan text/plain agar tidak memicu preflight CORS issue pada Google Apps script
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    }
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    // Reset formulir dan reload tabel
                    document.getElementById('inventoryForm').reset();
                    loadData();
                } else {
                    alert('Terjadi kesalahan saat menyimpan data.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Gagal menghubungi server database. Periksa koneksi atau URL Apps Script Anda.');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = originalBtnText;
            }
        }

        // Memuat data pertama kali ketika halaman selesai dibuka
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="text-center md:text-left bg-blue-600 rounded-xl p-6 shadow-md text-white">
            <h1 class="text-3xl font-bold"><i class="fas fa-tools mr-3"></i>Sistem Inventori Teknisi</h1>
            <p class="mt-2 text-blue-100">Manajemen Spare Part dan Tool Kerja</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Panel Input Form -->
            <div class="md:col-span-1 bg-white p-6 rounded-xl shadow-md h-fit">
                <h2 class="text-xl font-bold mb-4 border-b pb-2 text-gray-700">Tambah Item Baru</h2>
                <form id="inventoryForm" onsubmit="submitData(event)" class="space-y-4">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nama Tool/Spare Part</label>
                        <input type="text" id="namaTool" required placeholder="Contoh: Kunci Inggris" 
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ukuran / Spesifikasi</label>
                        <input type="text" id="ukuran" required placeholder="Contoh: 12 mm / Medium" 
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Kondisi</label>
                        <select id="kondisi" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                            <option value="Baik">Baik (Siap Pakai)</option>
                            <option value="Perbaikan">Sedang Diperbaiki</option>
                            <option value="Rusak">Rusak</option>
                        </select>
                    </div>

                    <button type="submit" id="btnSubmit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                        <i class="fas fa-plus mr-2"></i>Simpan Data
                    </button>
                </form>
            </div>

            <!-- Panel Tabel Data -->
            <div class="md:col-span-2 bg-white rounded-xl shadow-md overflow-hidden">
                <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-gray-700">Daftar Inventori</h2>
                    <button onclick="loadData()" class="text-blue-600 hover:text-blue-800 transition" title="Muat Ulang Data">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 border-b">
                                <th class="px-6 py-3 text-sm font-semibold text-gray-600">Nama Tool</th>
                                <th class="px-6 py-3 text-sm font-semibold text-gray-600">Ukuran</th>
                                <th class="px-6 py-3 text-sm font-semibold text-gray-600">Kondisi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Data akan dimuat melalui JavaScript -->
                        </tbody>
                    </table>
                </div>
                
                <!-- Indikator Loading -->
                <div id="loadingIndicator" class="text-center py-8">
                    <i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i>
                    <p class="text-gray-500 mt-2">Memuat data dari database...</p>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
